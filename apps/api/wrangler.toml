name = "nihongo-mn-api"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Local dev uses the same remote-named DB id after `wrangler d1 migrations apply nihongo-mn-db --remote`.
# Create fresh resources: `wrangler d1 create nihongo-mn-db`, `wrangler r2 bucket create nihongo-mn-media`.
[[d1_databases]]
binding = "DB"
database_name = "nihongo-mn-db"
database_id = "696b88cc-4d5a-4751-b25f-49cc2acfd475"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "nihongo-mn-media"

[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "http://localhost:5173,http://localhost:8081,http://localhost:8085,exp://localhost:8081"

# JWT_SECRET intentionally NOT set here.  For local dev, create
# `apps/api/.dev.vars` with `JWT_SECRET=any-string`.  In production it MUST be
# uploaded via `wrangler secret put JWT_SECRET --env production`.

# ─────────────────────────────────────────────────────────────────────────────
# Production environment — used by `wrangler deploy --env production` and the
# default `wrangler deploy` after the database id is filled in below.
# JWT_SECRET MUST be set via `wrangler secret put JWT_SECRET --env production`
# (never commit it).  CORS_ORIGIN should include the live Pages URL.
# ─────────────────────────────────────────────────────────────────────────────
[env.production]
name = "nihongo-mn-api"

[[env.production.d1_databases]]
binding = "DB"
database_name = "nihongo-mn-db"
database_id = "696b88cc-4d5a-4751-b25f-49cc2acfd475"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "nihongo-mn-media"

[env.production.vars]
ENVIRONMENT = "production"
# After first `wrangler deploy` of nihongo-mn-web, add its https://….workers.dev URL here.
# Preview subdomains on the same *.workers.dev zone are accepted by src/index.ts CORS logic.
CORS_ORIGIN = "https://nihongo-mn-web.osohoo691016.workers.dev"
